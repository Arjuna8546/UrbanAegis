{% extends "base.html" %}
{% load static %}

{% block extra_css %}<link rel="stylesheet" href="{% static 'css/cart.css' %}">{% endblock %}
{% block content %}
<br>
<div class="container">
    <div class="cart-container">
        <h1>Your cart</h1>
        <div id="cart-items" class="cart-items">
            <!-- Cart items will be dynamically inserted here -->
        </div>
    </div>
    <div class="order-summary">
        <h2>Order Summary</h2>
        <div class="summary-item">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-item">
            <span>Shipping</span>
            <span class="free-shipping">Free</span>
        </div>
        <div class="summary-item">
            <span>Tax</span>
            <span id="tax">$0.00</span>
        </div>
        <div class="summary-item total">
            <span>Total</span>
            <span id="total">$0.00</span>
        </div>
        <button class="checkout-btn" onclick="checkout()">Checkout</button>
        <a href="#" class="continue-shopping" onclick="continueShopping(event)">Continue Shopping</a>
    </div>
</div>
<br>

{% block scripts %}<script src="{% static 'script/cart.js' %}"></script>{% endblock %}
{% endblock %}
